<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Leaderboard - QuizAI</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
    <div class="container py-5">

        <!-- Header -->
        <div class="text-center mb-5">
            <div class="leaderboard-crown">👑</div>
            <h1 class="page-title mt-3">Global Leaderboard</h1>
            <p class="page-subtitle">Top performers from around the world</p>
        </div>

        <!-- Top 3 Podium -->
        <div class="podium-row mb-5" id="podiumSection">
            <!-- Populated by JS -->
        </div>

        <!-- Full Table -->
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-transparent border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="bi bi-list-ol me-2 text-primary"></i>Full Rankings
                </h5>
                <span class="badge bg-primary-soft text-primary" id="totalPlayers">0 players</span>
            </div>
            <div class="card-body p-0">
                <div id="leaderboardLoading" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3 text-muted">Loading leaderboard...</p>
                </div>
                <div id="leaderboardEmpty" class="text-center py-5 d-none">
                    <div class="empty-icon">🏆</div>
                    <h5 class="mt-3">No rankings yet</h5>
                    <p class="text-muted">Be the first to take a quiz and claim the top spot!</p>
                    <a href="/quiz/setup" class="btn btn-primary mt-2">Take a Quiz</a>
                </div>
                <div id="leaderboardTable" class="d-none">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">Rank</th>
                                    <th>Player</th>
                                    <th>Total Score</th>
                                    <th>Quizzes</th>
                                    <th class="pe-4">Avg Score</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboardBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Your stats -->
        <div class="mt-4" id="myRankCard" style="display:none;">
            <div class="card border-primary border-2">
                <div class="card-body d-flex align-items-center justify-content-between p-4">
                    <div>
                        <span class="badge bg-primary mb-1">Your Rank</span>
                        <h5 class="mb-0" id="myRankText">—</h5>
                    </div>
                    <a href="/quiz/setup" class="btn btn-primary">
                        <i class="bi bi-lightning-charge-fill me-2"></i>Improve Rank
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/leaderboard.js}"></script>
</body>
</html>
