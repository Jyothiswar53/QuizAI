<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register - QuizAI</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-card">
        <!-- Logo -->
        <div class="text-center mb-4">
            <a href="/" class="brand-link">
                <span class="brand-icon-lg">⚡</span>
                <span class="brand-name">QuizAI</span>
            </a>
            <h2 class="auth-title mt-3">Create your account</h2>
            <p class="auth-subtitle">Start your learning journey today</p>
        </div>

        <!-- Alert -->
        <div id="alertBox" class="alert d-none" role="alert"></div>

        <!-- Form -->
        <form id="registerForm" novalidate>
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username"
                           placeholder="Choose a username (3-50 chars)" required minlength="3"/>
                </div>
                <div class="form-text">Must be 3–50 characters long.</div>
            </div>
            <div class="mb-3">
                <label class="form-label" for="email">Email <span class="text-muted">(optional)</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" placeholder="your@email.com"/>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password"
                           placeholder="At least 6 characters" required minlength="6"/>
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label" for="confirmPassword">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" id="confirmPassword"
                           placeholder="Re-enter your password" required/>
                </div>
            </div>

            <!-- Password strength bar -->
            <div class="mb-4">
                <div class="progress" style="height:4px;">
                    <div id="strengthBar" class="progress-bar" style="width:0%"></div>
                </div>
                <small id="strengthLabel" class="text-muted"></small>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="registerBtn">
                <span id="registerText">Create Account</span>
                <span id="registerSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
            </button>
        </form>

        <div class="text-center">
            <p class="mb-0">Already have an account? <a href="/login" class="auth-link">Sign in</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
