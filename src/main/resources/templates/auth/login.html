<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - QuizAI</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body class="auth-page">

<div class="auth-container">
    <div class="auth-card">
        <!-- Logo -->
        <div class="text-center mb-4">
            <a href="/" class="brand-link">
                <span class="brand-icon-lg">⚡</span>
                <span class="brand-name">QuizAI</span>
            </a>
            <h2 class="auth-title mt-3">Welcome back</h2>
            <p class="auth-subtitle">Sign in to your account</p>
        </div>

        <!-- Alert -->
        <div id="alertBox" class="alert d-none" role="alert"></div>

        <!-- Form -->
        <form id="loginForm" novalidate>
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username"
                           placeholder="Enter your username" required/>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password"
                           placeholder="Enter your password" required/>
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="loginBtn">
                <span id="loginText">Sign In</span>
                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
            </button>
        </form>

        <div class="text-center">
            <p class="mb-0">Don't have an account? <a href="/register" class="auth-link">Register here</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
