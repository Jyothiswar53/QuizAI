<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quiz Session - QuizAI</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body class="quiz-body">

<!-- Quiz Header Bar -->
<div class="quiz-header">
    <div class="container d-flex align-items-center justify-content-between py-3">
        <div class="quiz-meta">
            <span class="quiz-topic-badge" id="sessionTopic">Topic</span>
            <span class="quiz-diff-badge ms-2" id="sessionDifficulty">Medium</span>
        </div>
        <div class="quiz-progress-info">
            <span class="text-muted">Question</span>
            <span class="fw-bold ms-1" id="currentQNum">1</span>
            <span class="text-muted"> of </span>
            <span class="fw-bold" id="totalQNum">10</span>
        </div>
        <div class="quiz-timer" id="timerDisplay">
            <i class="bi bi-clock me-1"></i>
            <span id="timerText">15:00</span>
        </div>
    </div>
    <!-- Progress Bar -->
    <div class="progress quiz-progress-bar" style="height:4px; border-radius:0;">
        <div class="progress-bar bg-primary" id="progressBar" style="width:0%;transition:width 0.3s ease;"></div>
    </div>
</div>

<div class="container quiz-content">
    <!-- Loading State -->
    <div id="loadingState" class="text-center py-5">
        <div class="ai-loading-animation mb-4">
            <div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>
        </div>
        <h4 class="mb-2">AI is generating your quiz...</h4>
        <p class="text-muted">Creating personalized questions just for you</p>
    </div>

    <!-- Question Card -->
    <div id="questionCard" class="d-none">
        <div class="question-card">
            <div class="question-number">Question <span id="qNumber">1</span></div>
            <h3 class="question-text" id="questionText">Loading question...</h3>
        </div>

        <!-- Options -->
        <div class="options-grid mt-4" id="optionsContainer">
            <div class="option-btn" id="optA" onclick="selectAnswer('A')">
                <span class="option-letter">A</span>
                <span class="option-text" id="optAText"></span>
            </div>
            <div class="option-btn" id="optB" onclick="selectAnswer('B')">
                <span class="option-letter">B</span>
                <span class="option-text" id="optBText"></span>
            </div>
            <div class="option-btn" id="optC" onclick="selectAnswer('C')">
                <span class="option-letter">C</span>
                <span class="option-text" id="optCText"></span>
            </div>
            <div class="option-btn" id="optD" onclick="selectAnswer('D')">
                <span class="option-letter">D</span>
                <span class="option-text" id="optDText"></span>
            </div>
        </div>

        <!-- Navigation -->
        <div class="quiz-nav mt-4">
            <button class="btn btn-outline-secondary px-4" id="prevBtn" onclick="prevQuestion()" disabled>
                <i class="bi bi-chevron-left me-1"></i>Previous
            </button>
            <div class="quiz-dots" id="questionDots"></div>
            <button class="btn btn-primary px-4" id="nextBtn" onclick="nextQuestion()">
                Next <i class="bi bi-chevron-right ms-1"></i>
            </button>
        </div>

        <!-- Submit Button (hidden until last question) -->
        <div class="text-center mt-4" id="submitSection" style="display:none!important;">
            <button class="btn btn-success btn-lg px-5 rounded-pill" id="submitBtn" onclick="submitQuiz()">
                <i class="bi bi-check-circle me-2"></i>Submit Quiz
                <span id="submitSpinner" class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
            </button>
        </div>
    </div>

    <!-- Time's Up Modal -->
    <div class="modal fade" id="timeUpModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center p-5">
                    <div class="modal-icon mb-3">⏰</div>
                    <h4 class="mb-2">Time's Up!</h4>
                    <p class="text-muted mb-4">Your time has expired. Submitting your current answers...</p>
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/quiz.js}"></script>
</body>
</html>
