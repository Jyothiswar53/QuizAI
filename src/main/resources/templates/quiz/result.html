<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quiz Result - QuizAI</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
    <div class="container py-5">
        <div id="resultLoading" class="text-center py-5">
            <div class="spinner-border text-primary" style="width:3rem;height:3rem;" role="status"></div>
            <p class="mt-3 text-muted">Loading your results...</p>
        </div>

        <div id="resultContent" class="d-none">
            <!-- Score Hero -->
            <div class="result-hero text-center mb-5">
                <div class="result-emoji" id="resultEmoji">🎉</div>
                <h1 class="result-score" id="resultScoreDisplay">0%</h1>
                <p class="result-label" id="resultLabel">Great job!</p>
                <div class="result-badges mt-3">
                    <span class="badge bg-secondary me-2" id="resultTopic"></span>
                    <span class="badge me-2" id="resultDifficulty"></span>
                    <span class="badge bg-info text-dark" id="resultTime"></span>
                </div>
            </div>

            <!-- Score Cards -->
            <div class="row g-3 mb-5 justify-content-center">
                <div class="col-6 col-md-3">
                    <div class="result-stat-card text-center">
                        <div class="result-stat-number text-success" id="correctCount">0</div>
                        <div class="result-stat-label">Correct</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="result-stat-card text-center">
                        <div class="result-stat-number text-danger" id="wrongCount">0</div>
                        <div class="result-stat-label">Wrong</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="result-stat-card text-center">
                        <div class="result-stat-number text-primary" id="totalCount">0</div>
                        <div class="result-stat-label">Total</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="result-stat-card text-center">
                        <div class="result-stat-number text-warning" id="timeTakenDisplay">0s</div>
                        <div class="result-stat-label">Time Taken</div>
                    </div>
                </div>
            </div>

            <!-- Adaptive Suggestion -->
            <div class="adaptive-card mb-5" id="adaptiveCard">
                <div class="d-flex align-items-center gap-3">
                    <div class="adaptive-icon">🧠</div>
                    <div>
                        <div class="fw-bold">Adaptive Suggestion</div>
                        <div class="text-muted" id="adaptiveMessage">Based on your score, we suggest...</div>
                    </div>
                    <a href="/quiz/setup" class="btn btn-primary ms-auto" id="adaptiveBtn">Try Now</a>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex gap-3 justify-content-center mb-5 flex-wrap">
                <button class="btn btn-outline-primary px-4" onclick="exportPDF()">
                    <i class="bi bi-file-pdf me-2"></i>Export PDF
                </button>
                <a href="/quiz/setup" class="btn btn-outline-success px-4">
                    <i class="bi bi-arrow-repeat me-2"></i>Try Again
                </a>
                <a href="/dashboard" class="btn btn-outline-secondary px-4">
                    <i class="bi bi-house me-2"></i>Dashboard
                </a>
                <a href="/leaderboard" class="btn btn-outline-warning px-4">
                    <i class="bi bi-trophy me-2"></i>Leaderboard
                </a>
            </div>

            <!-- Question-by-Question Review -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-transparent border-0 pt-4 px-4 pb-0">
                    <h5 class="card-title mb-0">
                        <i class="bi bi-list-check me-2 text-primary"></i>Question Review
                    </h5>
                </div>
                <div class="card-body p-4" id="reviewContainer"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/quiz.js}"></script>
</body>
</html>
